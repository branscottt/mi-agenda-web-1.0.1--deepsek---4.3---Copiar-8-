<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organify - Iniciar Sesión</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-screen">
        <div class="glass-panel login-panel">
            <!-- Logo y título -->
            <div class="logo-header">
                <i class="fas fa-calendar-alt"></i>
                <h1>Organify</h1>
                <p class="tagline">Accede a tu cuenta</p>
            </div>

            <!-- Toggle Iniciar Sesión / Registro -->
            <div class="mode-toggle">
                <button class="mode-btn active" id="login-mode">Iniciar Sesión</button>
                <button class="mode-btn" id="register-mode">Crear Cuenta</button>
            </div>

            <!-- Formulario de INICIO DE SESIÓN -->
            <div class="form-container active" id="login-container">
                <form id="login-form-modern">
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="login-email" placeholder="Correo electrónico" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="login-password" placeholder="Contraseña" required autocomplete="current-password">
                    </div>
                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember-me"> <span>Recordarme</span>
                        </label>
                        <a href="#" id="forgot-password-link">¿Olvidaste tu contraseña?</a>
                    </div>
                    <button type="submit" class="btn-grad btn-login">Iniciar Sesión</button>
                    <button type="button" id="google-login-btn" class="btn-google">
                        <i class="fab fa-google"></i> Continuar con Google
                    </button>
                </form>
                <div id="login-error-message" class="error-message" style="display:none;"></div>
            </div>

            <!-- Formulario de REGISTRO -->
            <div class="form-container" id="register-container" style="display:none;">
                <form id="register-form-modern">
                    <div class="input-group">
                        <i class="fas fa-user"></i>
                        <input type="text" id="register-name" placeholder="Nombre completo" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="register-email" placeholder="Correo electrónico" required autocomplete="email">
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="register-password" placeholder="Contraseña" required>
                    </div>
                    <div class="input-group">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="register-confirm-password" placeholder="Confirmar contraseña" required>
                    </div>
                    <!-- NUEVO CAMPO WHATSAPP -->
                    <div class="input-group">
                        <i class="fab fa-whatsapp"></i>
                        <input type="tel" id="register-whatsapp" placeholder="Número de WhatsApp (ej: +56912345678)" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn-grad btn-register">Crear Cuenta</button>
                </form>
                <div id="register-error-message" class="error-message" style="display:none;"></div>
                <div class="register-prompt">
                    ¿Ya tienes una cuenta? <a href="#" id="back-to-login">Inicia sesión aquí</a>
                </div>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p>© 2025 Organify - Todos los derechos reservados</p>
            </div>
        </div>

        <!-- Efectos de fondo -->
        <div class="login-background">
            <div class="bg-circle circle-1"></div>
            <div class="bg-circle circle-2"></div>
            <div class="bg-circle circle-3"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
