<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin - Agenda Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        /* Estilos específicos para super-admin (se añadirán en style.css, pero temporal) */
        .superadmin-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .users-table-container {
            overflow-x: auto;
        }
        .users-table {
            width: 100%;
            border-collapse: collapse;
        }
        .users-table th, .users-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .users-table th {
            background: rgba(179,0,255,0.2);
            color: #b300ff;
        }
        .action-icons i {
            margin: 0 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        .action-icons i:hover {
            transform: scale(1.2);
        }
        .edit-tenant { color: #ffc107; }
        .delete-tenant { color: #e74c3c; }
    </style>
</head>
<body>
    <div class="admin-screen superadmin-screen">
        <div class="glass-panel" style="max-width: 1400px; margin: 20px auto;">
            <!-- Header -->
            <div class="admin-header">
                <div class="header-left">
                    <a href="login.html" class="btn-back" id="logout-super"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
                    <h1><i class="fas fa-crown"></i> Panel Super Admin</h1>
                </div>
                <div class="header-right">
                    <div class="user-info">
                        <div class="user-avatar super-admin">
                            <i class="fas fa-user-shield"></i>
                        </div>
                        <span id="super-user-name">Cargando...</span>
                    </div>
                </div>
            </div>

            <!-- Estadísticas rápidas -->
            <div class="superadmin-stats">
                <div class="stat-box">
                    <div class="stat-icon"><i class="fas fa-building"></i></div>
                    <span>Total Tenants</span>
                    <h2 id="total-tenants">0</h2>
                </div>
                <div class="stat-box">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <span>Total Usuarios</span>
                    <h2 id="total-users">0</h2>
                </div>
            </div>

            <!-- Sección de Tenants (CRUD) -->
            <div class="content-panel" style="margin-bottom: 30px;">
                <div class="panel-header">
                    <h3><i class="fas fa-building"></i> Gestión de Tenants</h3>
                    <button class="btn-grad" id="btn-new-tenant"><i class="fas fa-plus"></i> Nuevo Tenant</button>
                </div>
                <div class="tenants-list-container">
                    <div id="tenants-list" class="services-cards-container">
                        <!-- Aquí se cargarán dinámicamente las tarjetas de tenants -->
                    </div>
                </div>
            </div>

            <!-- Sección de Usuarios (solo lectura) -->
            <div class="content-panel">
                <h3><i class="fas fa-users"></i> Usuarios del Sistema</h3>
                <div class="users-table-container">
                    <table class="users-table" id="users-table">
                        <thead>
                            <tr>
                                <th>Email</th><th>Nombre</th><th>Rol</th><th>Tenant ID</th><th>Registro</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <tr><td colspan="5">Cargando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para crear/editar tenant (se oculta por defecto) -->
    <div id="tenant-modal" class="modal" style="display:none;">
        <div class="modal-content glass-panel">
            <span class="modal-close">&times;</span>
            <h3 id="modal-title">Nuevo Tenant</h3>
            <form id="tenant-form">
                <input type="hidden" id="tenant-id">
                <div class="form-group">
                    <label>Nombre del negocio</label>
                    <input type="text" id="tenant-nombre" required>
                </div>
                <div class="form-group">
                    <label>Email de contacto</label>
                    <input type="email" id="tenant-email" required>
                </div>
                <div class="form-group">
                    <label>Plan</label>
                    <select id="tenant-plan">
                        <option value="freemium">Freemium</option>
                        <option value="premium">Premium</option>
                        <option value="enterprise">Enterprise</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <select id="tenant-estado">
                        <option value="activo">Activo</option>
                        <option value="inactivo">Inactivo</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn-grad">Guardar</button>
                    <button type="button" class="btn-secondary" id="cancel-modal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // El código JS específico de superadmin se inyectará en script.js
        // pero llamamos a la función de inicialización cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', function() {
            if (typeof iniciarSuperAdmin === 'function') {
                iniciarSuperAdmin();
            } else {
                console.error('iniciarSuperAdmin no definida');
            }
        });
    </script>
</body>
</html>
